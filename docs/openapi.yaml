openapi: 3.1.0
info:
  title: THE Travel Club API
  version: 1.0.0
  description: Enterprise contract for Travel Happier Everywhere aggregation endpoints.
servers:
  - url: /
    description: Same origin as the API host.
  - url: http://localhost:3000
    description: Local development default.
security:
  - ApiKeyAuth: []
paths:
  /:
    get:
      security: []
      summary: Service index with brand, version, and endpoint discovery.
      responses:
        '200':
          description: Service metadata and a map of available endpoints.
  /openapi.yaml:
    get:
      security: []
      summary: Fetch this OpenAPI specification (also at /openapi.json and /v1/openapi.yaml).
      responses:
        '200':
          description: The OpenAPI document.
          content:
            application/yaml: {}
  /health:
    get:
      security: []
      summary: Public liveness check.
      responses:
        '200':
          description: Process is alive.
  /v1/trust:
    get:
      security: []
      summary: Public trust manifest, machine-readable commitments and the API mechanism enforcing each.
      responses:
        '200':
          description: The published commitments (all-in pricing, no fake urgency, no paid ranking, freshness disclosure, honest failures, price context).
  /ready:
    get:
      summary: Internal readiness and provider diagnostics.
      responses:
        '200':
          description: At least one provider is ready.
        '503':
          description: No provider is currently ready.
  /metrics:
    get:
      summary: Internal in-process counters and timing snapshots.
      description: >-
        Returns JSON by default. Sends a Prometheus text exposition instead when
        the request carries `Accept: text/plain` or `?format=prometheus`.
      parameters:
        - in: query
          name: format
          required: false
          description: Set to `prometheus` to force the Prometheus text exposition.
          schema: { type: string, enum: [prometheus] }
      responses:
        '200':
          description: Metrics snapshot (JSON, or Prometheus text on negotiation).
  /v1/flights/search:
    get:
      summary: Search flight offers.
      parameters:
        - in: query
          name: from
          required: true
          description: Origin airport as a 3-letter IATA or 4-letter ICAO code (e.g. LAX, KLAX).
          schema: { type: string, minLength: 3, maxLength: 4, pattern: '^[A-Za-z]{3,4}$' }
        - in: query
          name: to
          required: true
          description: Destination airport as a 3-letter IATA or 4-letter ICAO code.
          schema: { type: string, minLength: 3, maxLength: 4, pattern: '^[A-Za-z]{3,4}$' }
        - in: query
          name: date
          description: Departure date (YYYY-MM-DD). Must be today or later.
          schema: { type: string, format: date }
        - in: query
          name: sort
          schema: { type: string, enum: [price, score] }
        - in: query
          name: limit
          description: Maximum number of offers to return (1-50).
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        '200': { description: Ranked offers. }
        '400': { description: Invalid query. }
        '401': { description: Authentication required. }
        '403': { description: Forbidden. }
        '429':
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema: { type: integer }
  /v1/flights/calendar:
    get:
      summary: Cheapest comparable price per day across a date window (flexible dates).
      parameters:
        - in: query
          name: from
          required: true
          description: Origin airport as a 3-letter IATA or 4-letter ICAO code.
          schema: { type: string, minLength: 3, maxLength: 4, pattern: '^[A-Za-z]{3,4}$' }
        - in: query
          name: to
          required: true
          description: Destination airport as a 3-letter IATA or 4-letter ICAO code.
          schema: { type: string, minLength: 3, maxLength: 4, pattern: '^[A-Za-z]{3,4}$' }
        - in: query
          name: date
          required: true
          description: Center date (YYYY-MM-DD). Must be today or later.
          schema: { type: string, format: date }
        - in: query
          name: flex
          description: Days to search on each side of the center date (1-7, default 3; clamped, not rejected).
          schema: { type: integer, minimum: 1, maximum: 7 }
      responses:
        '200': { description: Per-day cheapest totals plus the cheapest date in the window. }
        '400': { description: Invalid query or missing center date. }
        '429':
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema: { type: integer }
  /v1/hotels/search:
    get:
      summary: Search hotel offers.
      parameters:
        - in: query
          name: city
          required: true
          schema: { type: string, minLength: 1, maxLength: 120 }
        - in: query
          name: cityCode
          description: Optional 3-letter IATA/destination code used by real hotel providers (e.g. Hotelbeds).
          schema: { type: string, minLength: 3, maxLength: 3 }
        - in: query
          name: checkin
          description: Check-in date (YYYY-MM-DD). Must be today or later.
          schema: { type: string, format: date }
        - in: query
          name: checkout
          description: Check-out date (YYYY-MM-DD). Must be after check-in.
          schema: { type: string, format: date }
        - in: query
          name: sort
          schema: { type: string, enum: [price, score] }
        - in: query
          name: limit
          description: Maximum number of offers to return (1-50).
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        '200': { description: Ranked offers. }
        '400': { description: Invalid query. }
        '429':
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema: { type: integer }
  /v1/cars/search:
    get:
      summary: Search car rental offers.
      parameters:
        - in: query
          name: city
          required: true
          schema: { type: string, minLength: 1, maxLength: 120 }
        - in: query
          name: date
          description: Rental date (YYYY-MM-DD). Must be today or later.
          schema: { type: string, format: date }
        - in: query
          name: sort
          schema: { type: string, enum: [price, score] }
        - in: query
          name: limit
          description: Maximum number of offers to return (1-50).
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        '200': { description: Ranked offers. }
        '400': { description: Invalid query. }
        '429':
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema: { type: integer }
  /v1/prices/history:
    get:
      summary: Recent cheapest-price history for a search (30-day window).
      parameters:
        - in: query
          name: type
          required: true
          schema: { type: string, enum: [flights, hotels, cars] }
        - in: query
          name: from
          description: Origin airport code (required when type=flights).
          schema: { type: string, minLength: 3, maxLength: 4 }
        - in: query
          name: to
          description: Destination airport code (required when type=flights).
          schema: { type: string, minLength: 3, maxLength: 4 }
        - in: query
          name: city
          description: City (required when type=hotels or type=cars).
          schema: { type: string, minLength: 1, maxLength: 120 }
        - in: query
          name: checkin
          description: Optional stay start; hotels aggregate per stay length.
          schema: { type: string, format: date }
        - in: query
          name: checkout
          schema: { type: string, format: date }
      responses:
        '200': { description: Samples, average, lowest, latest, and a recent series. }
        '400': { description: Invalid or missing parameters. }
        '404': { description: Price history is disabled. }
  /v1/holidays:
    get:
      summary: Public holidays for a country and year (free, keyless enrichment; Nager.Date).
      description: >-
        Travel-planning context only. This endpoint never influences pricing,
        ranking, booking, money movement, or compliance. Returns 404 when the
        enrichment is disabled on the deployment.
      parameters:
        - in: query
          name: country
          required: true
          description: ISO 3166-1 alpha-2 country code, for example US or FR.
          schema: { type: string, minLength: 2, maxLength: 2 }
        - in: query
          name: year
          required: true
          schema: { type: integer, minimum: 1975, maximum: 2100 }
      responses:
        '200': { description: Country, year, count, and the normalized list of public holidays. }
        '400': { description: Invalid country code or year. }
        '404': { description: Holiday enrichment is not enabled on this deployment. }
        '502': { description: The upstream holidays source was unavailable or malformed. }
  /v1/alerts:
    get:
      summary: List the caller's price alerts / saved searches (owner-scoped by API key).
      responses:
        '200': { description: The caller's watches. }
    post:
      summary: Create a price alert / saved search. A watch with a threshold notifies when the cheapest total drops to it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [flights, hotels, cars] }
                from: { type: string, description: 'Flights origin code.' }
                to: { type: string, description: 'Flights destination code.' }
                date: { type: string, format: date }
                city: { type: string, description: 'Hotels/cars city.' }
                checkin: { type: string, format: date }
                checkout: { type: string, format: date }
                threshold: { type: number, minimum: 0, description: 'Notify when the cheapest total is at or below this. Omit for a plain saved search.' }
                currency: { type: string }
                notifyUrl: { type: string, description: 'Optional webhook URL (delivery is off unless ALERTS_WEBHOOKS_ENABLED; SSRF-guarded). Never echoed back.' }
      responses:
        '201': { description: The created watch (the notify URL is never returned; only notifyConfigured). }
        '400': { description: Invalid body or query. }
        '404': { description: Alerts are disabled. }
    delete:
      summary: Delete one of the caller's alerts by id.
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted. }
        '400': { description: Missing id. }
        '404': { description: Alert not found (or not owned by the caller). }
  /v1/auth/signup:
    post:
      security: []
      summary: Create a member account and start a session (sets an HttpOnly session cookie).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, description: 'At least 8 characters.' }
      responses:
        '201':
          description: The created member (public shape; never includes the password hash). A tc_session cookie is set.
          headers:
            Set-Cookie:
              description: HttpOnly, SameSite=Lax session cookie (Secure in production).
              schema: { type: string }
        '400': { description: Invalid email or weak password. }
        '404': { description: Accounts are not enabled on this deployment. }
        '409': { description: An account with that email already exists. }
  /v1/auth/login:
    post:
      security: []
      summary: Sign in and start a session (sets an HttpOnly session cookie).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: The member (public shape). A tc_session cookie is set.
          headers:
            Set-Cookie:
              description: HttpOnly, SameSite=Lax session cookie (Secure in production).
              schema: { type: string }
        '401': { description: Invalid email or password. }
        '404': { description: Accounts are not enabled on this deployment. }
  /v1/auth/logout:
    post:
      security: []
      summary: End the current session (clears the session cookie).
      responses:
        '200':
          description: Signed out; the tc_session cookie is cleared.
        '404': { description: Accounts are not enabled on this deployment. }
  /v1/me:
    get:
      security: []
      summary: The signed-in member (tier, benefits, loyalty balance). Requires a session cookie.
      responses:
        '200': { description: The member profile (public shape). }
        '401': { description: Not signed in. }
        '404': { description: Accounts are not enabled on this deployment. }
  /v1/orders:
    get:
      security: []
      summary: List the caller's booking orders (owner-scoped by session or API key).
      responses:
        '200': { description: The caller's orders. }
        '404': { description: Booking is not enabled on this deployment. }
    post:
      security: []
      summary: Book an offer via the aggregator (merchant of record). Adds a tier-aware service fee.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, offer, passengers, contact]
              properties:
                type: { type: string, enum: [flights, hotels, cars] }
                offer: { type: object, description: 'A selected offer snapshot (id, price, and provider detail from a search response).' }
                passengers:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [givenName, familyName]
                    properties:
                      givenName: { type: string }
                      familyName: { type: string }
                contact:
                  type: object
                  required: [email]
                  properties:
                    email: { type: string, format: email }
                    phone: { type: string }
      responses:
        '201': { description: The confirmed order (confirmation, provider reference, and an all-in total including the service fee). }
        '400': { description: Invalid body, offer, passengers, or contact. }
        '404': { description: Booking is not enabled on this deployment. }
        '502': { description: The aggregator could not complete the booking. }
  /v1/orders/{id}:
    get:
      security: []
      summary: Fetch one of the caller's orders.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: The order. }
        '404': { description: Order not found (or not owned by the caller). }
    delete:
      security: []
      summary: Cancel one of the caller's orders.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: The cancelled order, with any refund. }
        '404': { description: Order not found (or not owned by the caller). }
  /v1/billing:
    get:
      security: []
      summary: The signed-in member's subscription status and gateway mode. Requires a session.
      responses:
        '200': { description: Current tier, subscription status, tier, period end, and whether the gateway is live. }
        '401': { description: Not signed in. }
        '404': { description: Billing is not enabled on this deployment. }
  /v1/billing/subscribe:
    post:
      security: []
      summary: Subscribe the signed-in member to a paid tier (upgrades their membership).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier: { type: string, enum: [silver, gold] }
      responses:
        '200': { description: The upgraded member and the subscription summary. }
        '400': { description: Not a paid tier. }
        '401': { description: Not signed in. }
        '404': { description: Billing is not enabled. }
  /v1/billing/cancel:
    post:
      security: []
      summary: Cancel the signed-in member's subscription (downgrades to free).
      responses:
        '200': { description: The downgraded member and the cancelled subscription. }
        '400': { description: No active subscription. }
        '401': { description: Not signed in. }
        '404': { description: Billing is not enabled. }
  /v1/billing/webhook:
    post:
      security: []
      summary: Gateway webhook endpoint. Signature-verified when a webhook secret is configured.
      responses:
        '200': { description: The event was processed (applied or ignored). }
        '400': { description: Malformed webhook payload. }
        '401': { description: Invalid webhook signature. }
        '404': { description: Billing is not enabled. }
  /v1/loyalty:
    get:
      security: []
      summary: The signed-in member's loyalty balance, tier multiplier, and transaction history.
      responses:
        '200': { description: Balance, multiplier, points-per-USD, and recent transactions. }
        '401': { description: Not signed in. }
        '404': { description: Loyalty is not enabled on this deployment. }
  /v1/loyalty/redeem:
    post:
      security: []
      summary: Redeem loyalty points for account credit (100 points per USD).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [points]
              properties:
                points: { type: integer, minimum: 1 }
      responses:
        '200': { description: The new balance and the credit granted. }
        '400': { description: Invalid amount or not enough points. }
        '401': { description: Not signed in. }
        '404': { description: Loyalty is not enabled. }
  /v1/assistant:
    get:
      security: []
      summary: Assistant status (whether the natural-language search helper is enabled, and its model).
      responses:
        '200': { description: Enabled flag and model name. }
        '404': { description: The assistant is not enabled on this deployment. }
  /v1/assistant/parse:
    post:
      security: []
      summary: Turn free text into a SUGGESTED structured search query. Assistive only; never returns prices or booking. The suggestion is reviewed by the caller and validated by the engine.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string, maxLength: 400, description: 'A traveler request in plain language.' }
      responses:
        '200': { description: A whitelisted suggestion (type/from/to/date/city/checkin/checkout, any of which may be absent) plus a disclaimer. }
        '400': { description: Empty or overlong input. }
        '404': { description: The assistant is not enabled. }
        '502': { description: The local model is unavailable. }
  /v1/airport/info:
    get:
      summary: Look up airport information.
      parameters:
        - in: query
          name: code
          required: true
          description: Airport as a 3-letter IATA or 4-letter ICAO code.
          schema: { type: string, minLength: 3, maxLength: 4, pattern: '^[A-Za-z]{3,4}$' }
      responses:
        '200': { description: Airport information. }
        '400': { description: Invalid query. }
  /v1/flights/live:
    get:
      summary: Track live flight/aircraft data.
      parameters:
        - in: query
          name: icao24
          required: true
          schema: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200': { description: Tracking information. }
        '400': { description: Invalid query. }
components:
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      description: >-
        Optional client-supplied key that makes this money/booking mutation
        safe to retry. A repeat request with the same key replays the first
        response (with `Idempotent-Replay: true`) instead of acting twice.
      schema: { type: string, maxLength: 200 }
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
