<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="description" content="Travel Happier Everywhere. Honest, all-in prices across flights, hotels, and cars.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Travel Club">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>THE Travel Club</title>
<style>
  :root {
    --bg:#0b1020; --bg2:#0f1630; --card:rgba(255,255,255,0.05); --card-border:rgba(255,255,255,0.10);
    --ink:#eef2ff; --muted:#9aa6c8; --brand:#3987e5; --brand2:#199e70; --gold:#c98500; --danger:#e5484d;
    --radius:18px; --shadow:0 12px 40px rgba(0,0,0,0.45); --safe-b:env(safe-area-inset-bottom,0px);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:radial-gradient(1200px 600px at 80% -10%, #1a2550 0%, transparent 60%), radial-gradient(900px 500px at -10% 10%, #10321f 0%, transparent 55%), var(--bg);
    color:var(--ink); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  .app { max-width:520px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; }
  header.top {
    position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:12px; padding:14px 18px;
    background:linear-gradient(180deg, rgba(11,16,32,0.92), rgba(11,16,32,0.55)); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--card-border); padding-top:max(14px, env(safe-area-inset-top));
  }
  .logo { width:30px; height:30px; border-radius:9px; background:conic-gradient(from 210deg,var(--brand),var(--brand2),var(--brand)); flex:none; box-shadow:0 4px 14px rgba(57,135,229,0.4); }
  .brand { font-weight:700; letter-spacing:0.2px; }
  .brand small { display:block; font-weight:500; color:var(--muted); font-size:11px; letter-spacing:0.3px; }
  .spacer { flex:1; }
  .chip { border:1px solid var(--card-border); background:var(--card); color:var(--ink); border-radius:999px; padding:7px 12px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .chip .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
  .chip.on .dot { background:var(--brand2); box-shadow:0 0 8px var(--brand2); }
  main { flex:1; padding:18px 16px 108px; }
  h2.view-title { margin:4px 2px 14px; font-size:22px; letter-spacing:0.2px; }
  .sub { color:var(--muted); font-size:13px; margin:-8px 2px 16px; }
  .card { background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
  .card + .card { margin-top:12px; }
  label { display:block; font-size:12px; color:var(--muted); margin:0 0 5px 2px; font-weight:600; letter-spacing:0.2px; }
  input, select {
    width:100%; padding:13px 14px; border-radius:13px; border:1px solid var(--card-border);
    background:rgba(255,255,255,0.04); color:var(--ink); font-size:16px; outline:none; -webkit-appearance:none;
  }
  input:focus, select:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(57,135,229,0.25); }
  .row { display:flex; gap:10px; } .row > * { flex:1; }
  .field { margin-bottom:12px; }
  .seg { display:flex; gap:6px; background:rgba(255,255,255,0.04); border:1px solid var(--card-border); border-radius:14px; padding:5px; margin-bottom:16px; }
  .seg button { flex:1; border:0; background:transparent; color:var(--muted); padding:10px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; }
  .seg button.on { background:linear-gradient(180deg,var(--brand),#2f6fc4); color:#fff; box-shadow:0 6px 16px rgba(57,135,229,0.35); }
  button.btn { width:100%; border:0; border-radius:14px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; color:#fff;
    background:linear-gradient(180deg,var(--brand),#2f6fc4); box-shadow:0 10px 24px rgba(57,135,229,0.35); }
  button.btn.alt { background:linear-gradient(180deg,var(--brand2),#137a56); box-shadow:0 10px 24px rgba(25,158,112,0.32); }
  button.btn.ghost { background:transparent; border:1px solid var(--card-border); color:var(--ink); box-shadow:none; }
  button.btn.danger { background:transparent; border:1px solid rgba(229,72,77,0.5); color:#ff9ea1; box-shadow:none; }
  button:disabled { opacity:0.5; }
  .offer { display:flex; align-items:center; gap:12px; }
  .offer .info { flex:1; min-width:0; }
  .offer .title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .offer .meta { color:var(--muted); font-size:12px; margin-top:3px; }
  .price { text-align:right; }
  .price .amt { font-weight:800; font-size:19px; }
  .price .cur { color:var(--muted); font-size:11px; }
  .badge { display:inline-block; font-size:10px; font-weight:800; letter-spacing:0.4px; text-transform:uppercase; padding:3px 8px; border-radius:999px; border:1px solid var(--card-border); color:var(--muted); }
  .badge.live { color:#7ee0b6; border-color:rgba(25,158,112,0.5); }
  .badge.best { color:#cfe0ff; border-color:rgba(57,135,229,0.6); background:rgba(57,135,229,0.12); }
  .tier { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; padding:4px 10px; border-radius:999px; }
  .tier.free { color:#cfe0ff; background:rgba(57,135,229,0.14); border:1px solid rgba(57,135,229,0.4); }
  .tier.silver { color:#dfe6f5; background:rgba(180,190,210,0.16); border:1px solid rgba(180,190,210,0.5); }
  .tier.gold { color:#ffce7a; background:rgba(201,133,0,0.16); border:1px solid rgba(201,133,0,0.6); }
  .stat { display:flex; align-items:baseline; gap:8px; }
  .stat b { font-size:26px; } .stat span { color:var(--muted); font-size:12px; }
  ul.clean { list-style:none; margin:8px 0 0; padding:0; }
  ul.clean li { color:var(--muted); font-size:13px; padding:4px 0 4px 20px; position:relative; }
  ul.clean li:before { content:""; position:absolute; left:2px; top:10px; width:7px; height:7px; border-radius:50%; background:var(--brand2); }
  nav.tabbar {
    position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; justify-content:center;
    padding:8px 10px calc(8px + var(--safe-b)); background:linear-gradient(0deg, rgba(11,16,32,0.96), rgba(11,16,32,0.7));
    backdrop-filter:blur(16px); border-top:1px solid var(--card-border);
  }
  nav.tabbar .inner { display:flex; gap:6px; width:100%; max-width:520px; }
  nav.tabbar button { flex:1; border:0; background:transparent; color:var(--muted); font-size:11px; font-weight:700; padding:6px 4px; cursor:pointer; border-radius:12px; }
  nav.tabbar button .ic { display:block; font-size:20px; line-height:1.2; }
  nav.tabbar button.on { color:var(--ink); }
  nav.tabbar button.on .ic { filter:drop-shadow(0 4px 10px rgba(57,135,229,0.6)); }
  .empty { text-align:center; color:var(--muted); padding:40px 10px; }
  .wx-row { display:flex; gap:8px; overflow-x:auto; padding:2px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .wx-row::-webkit-scrollbar { display:none; }
  .wx { flex:none; min-width:76px; text-align:center; padding:10px 8px; border:1px solid var(--card-border); border-radius:14px; background:rgba(255,255,255,0.03); }
  .wx .d { font-size:11px; color:var(--muted); font-weight:700; letter-spacing:0.3px; text-transform:uppercase; }
  .wx .i { font-size:22px; line-height:1.5; }
  .wx .t { font-size:13px; font-weight:700; }
  .wx .t span { color:var(--muted); font-weight:500; }
  .place { display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--card-border); }
  .place:first-of-type { border-top:0; padding-top:2px; }
  .place .nm { flex:1; min-width:0; font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .place .nm small { display:block; color:var(--muted); font-weight:500; font-size:11px; text-transform:capitalize; }
  .attribution { color:var(--muted); font-size:10.5px; text-align:center; margin:14px 6px 0; line-height:1.6; }
  .toast { position:fixed; left:50%; bottom:calc(96px + var(--safe-b)); transform:translateX(-50%); background:#161f3d; border:1px solid var(--card-border); color:var(--ink); padding:12px 16px; border-radius:12px; box-shadow:var(--shadow); max-width:90%; z-index:50; font-size:14px; }
  .sheet-bg { position:fixed; inset:0; background:rgba(4,7,16,0.6); z-index:40; display:flex; align-items:flex-end; justify-content:center; }
  .sheet { width:100%; max-width:520px; background:var(--bg2); border-top-left-radius:22px; border-top-right-radius:22px; border:1px solid var(--card-border); border-bottom:0; padding:18px 16px calc(24px + var(--safe-b)); max-height:92vh; overflow:auto; }
  .sheet .grab { width:44px; height:5px; border-radius:3px; background:var(--card-border); margin:2px auto 14px; }
  .kv { display:flex; justify-content:space-between; padding:7px 0; font-size:14px; }
  .kv.total { border-top:1px solid var(--card-border); margin-top:6px; padding-top:12px; font-weight:800; font-size:17px; }
  .save { color:#7ee0b6; font-size:12px; font-weight:700; }
  a.link { color:#8fb6ff; text-decoration:none; }
  @media (prefers-reduced-motion: no-preference) {
    main > * { animation:rise .35s ease both; }
    @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    .sheet { animation:slideup .3s ease both; }
    @keyframes slideup { from { transform:translateY(30px); opacity:0.6; } to { transform:none; opacity:1; } }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo" aria-hidden="true"></div>
    <div class="brand">THE Travel Club<small>Travel Happier Everywhere</small></div>
    <div class="spacer"></div>
    <button class="chip" id="acctChip" onclick="go('account')"><span class="dot"></span><span id="acctLabel">Sign in</span></button>
  </header>
  <main id="view"><div class="empty">Loading...</div></main>
  <nav class="tabbar"><div class="inner">
    <button id="tab-search" onclick="go('search')"><span class="ic">&#128269;</span>Search</button>
    <button id="tab-trips" onclick="go('trips')"><span class="ic">&#9992;</span>Trips</button>
    <button id="tab-concierge" onclick="go('concierge')"><span class="ic">&#129517;</span>Concierge</button>
    <button id="tab-account" onclick="go('account')"><span class="ic">&#128100;</span>Account</button>
  </div></nav>
</div>

<script>
"use strict";
const state = { view:'search', me:null, type:'flights', offers:[], lastQuery:null, assistant:{enabled:false}, concierge:null, conciergeCity:'', conciergeCategory:'see' };

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(p){ if(!p||p.total==null) return 'n/a'; return (p.currency||'USD')+' '+Number(p.total).toLocaleString(undefined,{maximumFractionDigits:2}); }
function toast(msg){ const old=document.querySelector('.toast'); if(old) old.remove(); const t=el('<div class="toast">'+esc(msg)+'</div>'); document.body.appendChild(t); setTimeout(()=>t.remove(),3200); }
function isoAhead(d){ return new Date(Date.now()+d*86400000).toISOString().slice(0,10); }

async function api(path, opts){
  opts=opts||{}; const init={ method:opts.method||'GET', headers:{} };
  if(opts.body!==undefined){ init.headers['content-type']='application/json'; init.body=JSON.stringify(opts.body); }
  const res=await fetch(path, init);
  let json=null; try{ json=await res.json(); }catch(e){}
  if(!res.ok){ const m=json&&json.error&&json.error.message?json.error.message:('Request failed ('+res.status+')'); const err=new Error(m); err.status=res.status; throw err; }
  return json?json.data:null;
}

async function boot(){
  try{ state.me=await api('/v1/me'); }catch(e){ state.me=null; }
  try{ state.assistant=await api('/v1/assistant'); }catch(e){ state.assistant={enabled:false}; }
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
  go(state.view);
}
function go(view){ state.view=view; render(); window.scrollTo(0,0); }
function setTabs(){
  ['search','trips','concierge','account'].forEach(v=>{ const b=document.getElementById('tab-'+v); if(b) b.classList.toggle('on', state.view===v); });
  const label=document.getElementById('acctLabel'), chip=document.getElementById('acctChip');
  if(state.me){ label.textContent=state.me.email.split('@')[0]; chip.classList.add('on'); } else { label.textContent='Sign in'; chip.classList.remove('on'); }
}
function render(){ setTabs(); const v=document.getElementById('view'); v.innerHTML='';
  if(state.view==='search') return renderSearch(v);
  if(state.view==='trips') return renderTrips(v);
  if(state.view==='concierge') return renderConcierge(v);
  if(state.view==='account') return renderAccount(v);
}

/* ---------- Search ---------- */
function renderSearch(v){
  const seg=el('<div class="seg"></div>');
  [['flights','Flights'],['hotels','Hotels'],['cars','Cars']].forEach(pair=>{
    const b=el('<button'+(state.type===pair[0]?' class="on"':'')+'>'+pair[1]+'</button>'); b.onclick=()=>{ state.type=pair[0]; state.offers=[]; render(); }; seg.appendChild(b);
  });
  v.appendChild(el('<h2 class="view-title">Find the honest lowest price</h2>'));
  v.appendChild(el('<div class="sub">Every price is an all-in total. No fake urgency, no paid ranking.</div>'));
  if(state.assistant && state.assistant.enabled){
    const nl=el('<div class="card" style="margin-bottom:14px;background:linear-gradient(180deg,rgba(57,135,229,0.10),rgba(25,158,112,0.06))"></div>');
    nl.appendChild(el('<label style="margin-bottom:8px">&#10024; Describe your trip</label>'));
    nl.appendChild(el('<input id="nl_text" placeholder="cheap flight from LA to New York in May">'));
    const go2=el('<button id="nl_go" class="btn ghost" style="margin-top:10px">Fill from description</button>'); go2.onclick=parseAssistant; nl.appendChild(go2);
    nl.appendChild(el('<div class="sub" style="margin:10px 2px 0;font-size:11px">A local AI suggests the fields. You review them; prices always come from the live engine.</div>'));
    v.appendChild(nl);
  }
  v.appendChild(seg);
  const form=el('<div class="card"></div>');
  if(state.type==='flights'){
    form.appendChild(el('<div class="row"><div class="field"><label>From</label><input id="q_from" placeholder="LAX" maxlength="4" value="LAX"></div><div class="field"><label>To</label><input id="q_to" placeholder="JFK" maxlength="4" value="JFK"></div></div>'));
    form.appendChild(el('<div class="field"><label>Depart</label><input id="q_date" type="date" value="'+isoAhead(30)+'"></div>'));
  } else if(state.type==='hotels'){
    form.appendChild(el('<div class="field"><label>City</label><input id="q_city" placeholder="Las Vegas" value="Las Vegas"></div>'));
    form.appendChild(el('<div class="row"><div class="field"><label>Check in</label><input id="q_checkin" type="date" value="'+isoAhead(30)+'"></div><div class="field"><label>Check out</label><input id="q_checkout" type="date" value="'+isoAhead(33)+'"></div></div>'));
  } else {
    form.appendChild(el('<div class="field"><label>City</label><input id="q_city" placeholder="Miami" value="Miami"></div>'));
    form.appendChild(el('<div class="field"><label>Date</label><input id="q_date" type="date" value="'+isoAhead(30)+'"></div>'));
  }
  const btn=el('<button class="btn">Search '+state.type+'</button>'); btn.onclick=doSearch; form.appendChild(btn);
  v.appendChild(form);
  const results=el('<div id="results" style="margin-top:14px"></div>'); v.appendChild(results);
  if(state.offers.length) renderOffers(results);
}
function q(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
async function parseAssistant(){
  const text=q('nl_text'); if(!text){ toast('Describe your trip first'); return; }
  const btn=document.getElementById('nl_go'); btn.disabled=true; btn.textContent='Thinking...';
  try{
    const d=await api('/v1/assistant/parse',{method:'POST',body:{text:text}});
    const s=d.suggestion||{};
    if(s.type){ state.type=s.type; }
    render();
    const set=(id,val)=>{ const e=document.getElementById(id); if(e&&val) e.value=val; };
    if(state.type==='flights'){ set('q_from',s.from); set('q_to',s.to); set('q_date',s.date); }
    else if(state.type==='hotels'){ set('q_city',s.city); set('q_checkin',s.checkin); set('q_checkout',s.checkout); }
    else { set('q_city',s.city); set('q_date',s.date); }
    toast(d.disclaimer);
  }catch(e){ const b=document.getElementById('nl_go'); if(b){ b.disabled=false; b.textContent='Fill from description'; } toast(e.message); }
}
async function doSearch(){
  let path, query={};
  if(state.type==='flights'){ query={from:q('q_from'),to:q('q_to'),date:q('q_date')}; path='/v1/flights/search?from='+encodeURIComponent(query.from)+'&to='+encodeURIComponent(query.to)+'&date='+query.date; }
  else if(state.type==='hotels'){ query={city:q('q_city'),checkin:q('q_checkin'),checkout:q('q_checkout')}; path='/v1/hotels/search?city='+encodeURIComponent(query.city)+'&checkin='+query.checkin+'&checkout='+query.checkout; }
  else { query={city:q('q_city'),date:q('q_date')}; path='/v1/cars/search?city='+encodeURIComponent(query.city)+'&date='+query.date; }
  const results=document.getElementById('results'); results.innerHTML='<div class="empty">Searching every source...</div>';
  try{
    const data=await api(path); state.offers=data.offers||[]; state.lastQuery={type:state.type,query:query};
    renderOffers(results);
  }catch(e){ results.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
function renderOffers(container){
  container.innerHTML='';
  if(!state.offers.length){ container.appendChild(el('<div class="empty">No comparable offers right now. Try different dates.</div>')); return; }
  const head=el('<div style="display:flex;justify-content:space-between;align-items:center;margin:2px 4px 10px"><b>'+state.offers.length+' offers</b></div>');
  if(state.me){ const w=el('<button class="chip" style="font-size:12px">Watch price</button>'); w.onclick=createWatch; head.appendChild(w); }
  container.appendChild(head);
  state.offers.forEach((o,i)=>{
    const card=el('<div class="card"></div>');
    const fresh=o.freshness==='live'?'<span class="badge live">live</span>':'<span class="badge">'+esc(o.freshness||'')+'</span>';
    const best=i===0?'<span class="badge best">lowest</span> ':'';
    const est=(o.price&&o.price.estimated)?' <span class="badge">est.</span>':'';
    const row=el('<div class="offer"><div class="info"><div class="title">'+esc(o.title||o.provider||'Offer')+'</div><div class="meta">'+best+esc(o.provider||'')+' '+fresh+est+'</div></div><div class="price"><div class="amt">'+money(o.price)+'</div><div class="cur">all-in total</div></div></div>');
    card.appendChild(row);
    const book=el('<button class="btn alt" style="margin-top:12px">Book this</button>'); book.onclick=()=>openBooking(o); card.appendChild(book);
    container.appendChild(card);
  });
}

/* ---------- Booking sheet ---------- */
function openBooking(offer){
  if(!state.me){ toast('Sign in to book and earn points'); go('account'); return; }
  const fee = state.me.tier==='gold' ? 0 : Math.round((offer.price.total||0)*0.02*100)/100;
  const total = Math.round(((offer.price.total||0)+fee)*100)/100;
  const cur = offer.price.currency||'USD';
  const bg=el('<div class="sheet-bg"></div>'); bg.onclick=(e)=>{ if(e.target===bg) bg.remove(); };
  const sheet=el('<div class="sheet"></div>');
  sheet.appendChild(el('<div class="grab"></div>'));
  sheet.appendChild(el('<h2 class="view-title" style="margin-top:0">Confirm your booking</h2>'));
  sheet.appendChild(el('<div class="sub">'+esc(offer.title||offer.provider||'')+'</div>'));
  sheet.appendChild(el('<div class="row"><div class="field"><label>Given name</label><input id="b_given" value="'+esc((state.me.email||'').split("@")[0])+'"></div><div class="field"><label>Family name</label><input id="b_family" placeholder="Traveler"></div></div>'));
  sheet.appendChild(el('<div class="field"><label>Contact email</label><input id="b_email" type="email" value="'+esc(state.me.email)+'"></div>'));
  const fees=el('<div class="card" style="background:rgba(255,255,255,0.03)"></div>');
  fees.appendChild(el('<div class="kv"><span>Trip total</span><span>'+cur+' '+(offer.price.total||0)+'</span></div>'));
  fees.appendChild(el('<div class="kv"><span>Service fee'+(state.me.tier==='gold'?' <span class="save">waived</span>':'')+'</span><span>'+cur+' '+fee+'</span></div>'));
  fees.appendChild(el('<div class="kv total"><span>Total</span><span>'+cur+' '+total+'</span></div>'));
  sheet.appendChild(fees);
  sheet.appendChild(el('<div class="sub" style="margin:10px 2px 0;font-size:11px">Cancel anytime from your trips. Any refund follows the provider policy and is shown when you cancel.</div>'));
  const confirm=el('<button class="btn alt" style="margin-top:14px">Confirm and book</button>');
  confirm.onclick=async()=>{ confirm.disabled=true; confirm.textContent='Booking...';
    try{
      const order=await api('/v1/orders',{method:'POST',body:{type:state.type,offer:offer,passengers:[{givenName:q('b_given'),familyName:q('b_family')}],contact:{email:q('b_email')}}});
      bg.remove(); showConfirmation(order);
    }catch(e){ confirm.disabled=false; confirm.textContent='Confirm and book'; toast(e.message); }
  };
  sheet.appendChild(confirm);
  bg.appendChild(sheet); document.body.appendChild(bg);
}
function showConfirmation(order){
  const bg=el('<div class="sheet-bg"></div>'); const sheet=el('<div class="sheet"></div>');
  sheet.appendChild(el('<div class="grab"></div>'));
  sheet.appendChild(el('<div style="text-align:center;font-size:44px">&#10004;&#65039;</div>'));
  sheet.appendChild(el('<h2 class="view-title" style="text-align:center;margin-top:4px">You are booked</h2>'));
  sheet.appendChild(el('<div class="card" style="text-align:center"><div class="sub" style="margin:0 0 8px">Confirmation</div><div style="font-size:24px;font-weight:800;letter-spacing:2px">'+esc(order.confirmation||order.providerRef||'CONFIRMED')+'</div></div>'));
  if(order.loyaltyEarned){ sheet.appendChild(el('<div class="card" style="text-align:center"><div class="stat" style="justify-content:center"><b>+'+order.loyaltyEarned+'</b><span>loyalty points earned</span></div></div>')); }
  const done=el('<button class="btn" style="margin-top:14px">View my trips</button>'); done.onclick=()=>{ bg.remove(); go('trips'); };
  sheet.appendChild(done);
  bg.appendChild(sheet); document.body.appendChild(bg);
  api('/v1/me').then(m=>{ state.me=m; setTabs(); }).catch(()=>{});
}

/* ---------- Trips ---------- */
async function renderTrips(v){
  v.appendChild(el('<h2 class="view-title">My trips</h2>'));
  if(!state.me){ v.appendChild(signInPrompt('Sign in to see your booked trips.')); return; }
  const box=el('<div id="trips"><div class="empty">Loading...</div></div>'); v.appendChild(box);
  try{
    const data=await api('/v1/orders'); box.innerHTML='';
    if(!data.orders.length){ box.appendChild(el('<div class="empty">No trips yet. Book one from Search.</div>')); return; }
    data.orders.forEach(o=>{
      const card=el('<div class="card"></div>');
      const st=o.status==='confirmed'?'<span class="badge live">confirmed</span>':(o.status==='cancelled'?'<span class="badge">cancelled</span>':'<span class="badge">'+esc(o.status)+'</span>');
      const pts=o.loyaltyEarned?('+'+o.loyaltyEarned+' pts'):'all-in';
      card.appendChild(el('<div class="offer"><div class="info"><div class="title">'+esc((o.offer&&o.offer.title)||o.type)+'</div><div class="meta">'+st+' '+esc(o.provider||'')+' &middot; '+esc(o.confirmation||'')+'</div></div><div class="price"><div class="amt">'+((o.price&&o.price.currency)||'USD')+' '+(o.total!=null?o.total:'-')+'</div><div class="cur">'+pts+'</div></div></div>'));
      if(o.status==='confirmed'){ const c=el('<button class="btn danger" style="margin-top:12px">Cancel booking</button>'); c.onclick=async()=>{ c.disabled=true; try{ await api('/v1/orders/'+encodeURIComponent(o.id),{method:'DELETE'}); toast('Booking cancelled'); renderTrips(clear(v)); }catch(e){ c.disabled=false; toast(e.message); } }; card.appendChild(c); }
      box.appendChild(card);
    });
  }catch(e){ box.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
function clear(v){ v.innerHTML=''; return v; }

/* ---------- Concierge ---------- */
function wxIcon(desc){
  const d=String(desc||'').toLowerCase();
  if(d.indexOf('thunder')>=0) return '⛈️';
  if(d.indexOf('snow')>=0||d.indexOf('freezing')>=0) return '❄️';
  if(d.indexOf('shower')>=0||d.indexOf('drizzle')>=0) return '🌦️';
  if(d.indexOf('rain')>=0) return '🌧️';
  if(d.indexOf('fog')>=0) return '🌫️';
  if(d.indexOf('overcast')>=0) return '☁️';
  if(d.indexOf('partly')>=0) return '⛅';
  if(d.indexOf('clear')>=0) return '☀️';
  return '🌡️';
}
function weekday(iso){ try{ return new Date(iso+'T12:00:00Z').toLocaleDateString(undefined,{weekday:'short'}); }catch(e){ return iso; } }
function conciergeCache(){ try{ const raw=localStorage.getItem('tc.concierge.last'); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
function renderConcierge(v){
  v.appendChild(el('<h2 class="view-title">Trip concierge</h2>'));
  v.appendChild(el('<div class="sub">Weather, local ideas, and context for where you are. Free community sources, saved for offline.</div>'));
  const form=el('<div class="card"></div>');
  form.appendChild(el('<div class="field"><label>Destination city</label><input id="c_city" placeholder="Lisbon" value="'+esc(state.conciergeCity||'')+'"></div>'));
  const seg=el('<div class="seg" style="margin-bottom:12px"></div>');
  [['see','See'],['eat','Eat'],['cafe','Cafes'],['drink','Drinks'],['park','Parks']].forEach(p=>{
    const b=el('<button'+(state.conciergeCategory===p[0]?' class="on"':'')+'>'+p[1]+'</button>');
    b.onclick=()=>{ state.conciergeCity=q('c_city'); state.conciergeCategory=p[0]; render(); if(state.conciergeCity) loadConcierge(); };
    seg.appendChild(b);
  });
  form.appendChild(seg);
  const btn=el('<button class="btn">Get my briefing</button>'); btn.onclick=loadConcierge; form.appendChild(btn);
  v.appendChild(form);
  const out=el('<div id="concOut" style="margin-top:14px"></div>'); v.appendChild(out);
  const cached=conciergeCache();
  if(state.concierge) renderBriefing(out, state.concierge, false);
  else if(cached && cached.data){
    renderBriefing(out, cached.data, true);
    const inp=document.getElementById('c_city'); if(inp && !inp.value) inp.value=cached.city||'';
  }
}
async function loadConcierge(){
  const city=q('c_city'); if(!city){ toast('Type a destination city first'); return; }
  state.conciergeCity=city;
  const out=document.getElementById('concOut'); out.innerHTML='<div class="empty">Preparing your briefing...</div>';
  try{
    const d=await api('/v1/concierge?city='+encodeURIComponent(city)+'&category='+encodeURIComponent(state.conciergeCategory));
    state.concierge=d;
    try{ localStorage.setItem('tc.concierge.last', JSON.stringify({city:city, data:d})); }catch(e){}
    renderBriefing(clear(out), d, false);
  }catch(e){
    const cached=conciergeCache();
    if(cached && cached.data && cached.city && cached.city.toLowerCase()===city.toLowerCase()){
      renderBriefing(clear(out), cached.data, true);
      toast('You look offline. Showing your saved briefing.');
    } else {
      out.innerHTML='<div class="empty">'+esc(e.message)+'</div>';
    }
  }
}
function renderBriefing(box, d, fromCache){
  const dest=d.destination||{};
  const head=el('<div class="card"></div>');
  const where=[dest.country, dest.timezone].filter(Boolean).join(' · ');
  head.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:800;font-size:18px">'+esc(dest.name||dest.query||'')+'</div><div class="sub" style="margin:3px 0 0">'+esc(where)+'</div></div>'+(fromCache?'<span class="badge">saved offline</span>':'')+'</div>'));
  box.appendChild(head);
  const s=d.sections||{};

  if(s.weather && s.weather.status==='ok' && s.weather.data && s.weather.data.days){
    const card=el('<div class="card"></div>');
    card.appendChild(el('<div style="font-weight:700;margin-bottom:10px">Next days</div>'));
    const row=el('<div class="wx-row"></div>');
    s.weather.data.days.forEach(day=>{
      const hi=day.tempMaxC==null?'-':Math.round(day.tempMaxC), lo=day.tempMinC==null?'-':Math.round(day.tempMinC);
      row.appendChild(el('<div class="wx"><div class="d">'+esc(weekday(day.date))+'</div><div class="i">'+wxIcon(day.description)+'</div><div class="t">'+hi+'° <span>'+lo+'°</span></div></div>'));
    });
    card.appendChild(row); box.appendChild(card);
  } else if(s.weather && s.weather.status==='unavailable'){
    box.appendChild(el('<div class="card"><div class="sub" style="margin:0">Weather is unavailable right now. We say so instead of guessing.</div></div>'));
  }

  if(s.holidays && s.holidays.status==='ok' && s.holidays.data && s.holidays.data.holidays && s.holidays.data.holidays.length){
    const card=el('<div class="card"></div>');
    card.appendChild(el('<div style="font-weight:700;margin-bottom:6px">Public holidays this year</div>'));
    card.appendChild(el('<div class="sub" style="margin:0 0 8px;font-size:11px">Shops and museums may close or get busy on these days.</div>'));
    s.holidays.data.holidays.slice(0,6).forEach(h=>{
      card.appendChild(el('<div class="kv"><span>'+esc(h.localName||h.name)+'</span><span style="color:var(--muted)">'+esc(h.date)+'</span></div>'));
    });
    box.appendChild(card);
  }

  if(s.guide && s.guide.status==='ok' && s.guide.data){
    const g=s.guide.data;
    const card=el('<div class="card"></div>');
    card.appendChild(el('<div style="font-weight:700;margin-bottom:8px">About '+esc(g.title)+'</div>'));
    card.appendChild(el('<div class="sub" style="margin:0;font-size:13px;line-height:1.65">'+esc(g.summary)+'</div>'));
    card.appendChild(el('<div style="margin-top:10px"><a class="link" href="'+esc(g.url)+'" target="_blank" rel="noopener">Read the full guide</a></div>'));
    box.appendChild(card);
  }

  if(s.places && s.places.status==='ok' && s.places.data){
    const p=s.places.data;
    const card=el('<div class="card"></div>');
    const labels={see:'Things to see', eat:'Places to eat', cafe:'Cafes nearby', drink:'Bars and pubs', park:'Parks and green space'};
    card.appendChild(el('<div style="font-weight:700;margin-bottom:4px">'+esc(labels[p.category]||'Nearby')+'</div>'));
    if(!p.places.length){ card.appendChild(el('<div class="sub" style="margin:6px 0 0">Nothing mapped in this category yet. Try another one.</div>')); }
    p.places.forEach(pl=>{
      const line=el('<div class="place"><div class="nm">'+esc(pl.name)+'<small>'+esc(pl.kind||'')+'</small></div></div>');
      const map=el('<a class="chip" style="font-size:12px;text-decoration:none" href="'+esc(pl.mapUrl)+'" target="_blank" rel="noopener">Map</a>');
      line.appendChild(map); card.appendChild(line);
    });
    box.appendChild(card);
  } else if(s.places && s.places.status==='unavailable'){
    box.appendChild(el('<div class="card"><div class="sub" style="margin:0">Nearby places are unavailable right now.</div></div>'));
  }

  if(Array.isArray(d.attribution) && d.attribution.length){
    box.appendChild(el('<div class="attribution">'+d.attribution.map(esc).join(' · ')+'</div>'));
  }
}

/* ---------- Account ---------- */
function signInPrompt(msg){ const c=el('<div class="card"><div class="sub" style="margin:0 0 12px">'+esc(msg)+'</div></div>'); const b=el('<button class="btn">Sign in or join</button>'); b.onclick=()=>go('account'); c.appendChild(b); return c; }
function renderAccount(v){
  if(!state.me) return renderAuth(v);
  const m=state.me;
  v.appendChild(el('<h2 class="view-title">Your membership</h2>'));
  const memberCard=el('<div class="card"></div>');
  memberCard.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">'+esc(m.email)+'</div><div class="sub" style="margin:4px 0 0">'+esc(m.tierName||m.tier)+' member</div></div><span class="tier '+esc(m.tier)+'">'+esc(m.tier)+'</span></div>'));
  const ul=el('<ul class="clean"></ul>'); (m.benefits||[]).forEach(b=>ul.appendChild(el('<li>'+esc(b)+'</li>'))); memberCard.appendChild(ul);
  v.appendChild(memberCard);

  const plan=el('<div class="card"></div>'); plan.appendChild(el('<div style="font-weight:700;margin-bottom:8px">Membership plan</div>'));
  if(m.tier!=='gold'){ const g=el('<button class="btn" style="margin-bottom:8px">Upgrade to Globetrotter (gold)</button>'); g.onclick=()=>subscribe('gold'); plan.appendChild(g); }
  if(m.tier==='free'){ const s=el('<button class="btn ghost">Get Voyager (silver)</button>'); s.onclick=()=>subscribe('silver'); plan.appendChild(s); }
  if(m.tier!=='free'){ const c=el('<button class="btn danger" style="margin-top:8px">Cancel membership</button>'); c.onclick=cancelSub; plan.appendChild(c); }
  v.appendChild(plan);

  const loy=el('<div class="card"></div>'); loy.innerHTML='<div style="font-weight:700;margin-bottom:6px">Loyalty</div><div class="empty" style="padding:10px">Loading...</div>'; v.appendChild(loy);
  api('/v1/loyalty').then(d=>{
    loy.innerHTML='<div style="font-weight:700;margin-bottom:10px">Loyalty</div>';
    loy.appendChild(el('<div class="stat"><b>'+d.balance+'</b><span>points &middot; '+d.multiplier+'x earning &middot; '+d.pointsPerUsd+' pts = 1 USD</span></div>'));
    if(d.balance>0){ const r=el('<button class="btn ghost" style="margin-top:12px">Redeem '+d.balance+' points for credit</button>'); r.onclick=()=>redeem(d.balance); loy.appendChild(r); }
  }).catch(()=>{ loy.innerHTML='<div class="sub">Loyalty unavailable</div>'; });

  const watch=el('<div class="card"></div>'); watch.innerHTML='<div style="font-weight:700;margin-bottom:6px">Price watches</div><div id="watchList" class="empty" style="padding:10px">Loading...</div>'; v.appendChild(watch); loadWatches();

  const out=el('<button class="btn ghost" style="margin-top:14px">Sign out</button>'); out.onclick=logout; v.appendChild(out);
  v.appendChild(el('<div class="sub" style="text-align:center;margin-top:14px"><a class="link" href="/v1/trust">Read our trust commitments</a></div>'));
}
function renderAuth(v){
  v.appendChild(el('<h2 class="view-title">Join THE Travel Club</h2>'));
  v.appendChild(el('<div class="sub">Free to join. Members earn loyalty points and unlock member rates.</div>'));
  const card=el('<div class="card"></div>');
  card.appendChild(el('<div class="field"><label>Email</label><input id="a_email" type="email" placeholder="you@example.com"></div>'));
  card.appendChild(el('<div class="field"><label>Password</label><input id="a_pw" type="password" placeholder="At least 8 characters"></div>'));
  const join=el('<button class="btn">Create my account</button>'); join.onclick=()=>auth('/v1/auth/signup');
  const login=el('<button class="btn ghost" style="margin-top:8px">I already have an account</button>'); login.onclick=()=>auth('/v1/auth/login');
  card.appendChild(join); card.appendChild(login); v.appendChild(card);
}
async function auth(path){
  try{ const d=await api(path,{method:'POST',body:{email:q('a_email'),password:q('a_pw')}}); state.me=d.user; toast('Welcome to the club'); go('account'); }
  catch(e){ toast(e.message); }
}
async function logout(){ try{ await api('/v1/auth/logout',{method:'POST'}); }catch(e){} state.me=null; go('search'); }
async function subscribe(tier){ try{ const d=await api('/v1/billing/subscribe',{method:'POST',body:{tier:tier}}); state.me=d.member; toast('You are now a '+d.member.tierName+' member'); go('account'); }catch(e){ toast(e.message); } }
async function cancelSub(){ try{ const d=await api('/v1/billing/cancel',{method:'POST'}); state.me=d.member; toast('Membership cancelled'); go('account'); }catch(e){ toast(e.message); } }
async function redeem(points){ try{ const d=await api('/v1/loyalty/redeem',{method:'POST',body:{points:points}}); toast('Redeemed for '+d.creditUsd+' USD credit'); go('account'); }catch(e){ toast(e.message); } }

/* ---------- Watches ---------- */
async function createWatch(){
  if(!state.lastQuery){ toast('Run a search first'); return; }
  try{ await api('/v1/alerts',{method:'POST',body:Object.assign({type:state.lastQuery.type},state.lastQuery.query)}); toast('Watching this search'); }
  catch(e){ toast(e.message); }
}
async function loadWatches(){
  const box=document.getElementById('watchList'); if(!box) return;
  try{
    const d=await api('/v1/alerts'); box.classList.remove('empty'); box.innerHTML='';
    if(!d.alerts.length){ box.innerHTML='<div class="sub">No watches yet. Tap "Watch price" on a search.</div>'; return; }
    d.alerts.forEach(a=>{
      const desc=a.type==='flights'?((a.query&&a.query.from)+' to '+(a.query&&a.query.to)):((a.query&&a.query.city)||a.type);
      const line=el('<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--card-border)"><span>'+esc(desc)+' <span class="badge">'+esc(a.type)+'</span></span></div>');
      const del=el('<button class="chip" style="font-size:12px">Remove</button>'); del.onclick=async()=>{ try{ await api('/v1/alerts?id='+encodeURIComponent(a.id),{method:'DELETE'}); loadWatches(); }catch(e){ toast(e.message); } };
      line.appendChild(del); box.appendChild(line);
    });
  }catch(e){ box.innerHTML='<div class="sub">'+esc(e.message)+'</div>'; }
}

boot();
</script>
</body>
</html>
